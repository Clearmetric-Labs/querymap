[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "query-map"
dynamic = ["version"]
description = "Map one SQL statement into deterministic CatalogKit dependencies."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [
    {name = "ClearMetric Labs"},
]
keywords = [
    "sql",
    "lineage",
    "dependencies",
    "ctes",
    "sqlglot",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "catalog-core>=0.1.0",
    "sqlglot>=25.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]
release = [
    "build>=1.2.2",
    "twine>=5.1.1",
]

[project.scripts]
query-map = "query_map.cli:main"

[project.urls]
Homepage = "https://github.com/Clearmetric-Labs/CatalogKit"
Source = "https://github.com/Clearmetric-Labs/CatalogKit"
Issues = "https://github.com/Clearmetric-Labs/CatalogKit/issues"

[tool.setuptools.dynamic]
version = {attr = "query_map._version.__version__"}

[tool.setuptools.packages.find]
where = ["."]
include = ["query_map*"]
