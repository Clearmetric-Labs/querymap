name: CLA

# Enforces the ClearMetric ICLA before merge. Signatures are stored on the
# unprotected `cla-signatures` branch so branch protection on `main` does not
# block signature commits. After enabling this workflow, add "CLA / Contributor
# License Agreement" as a required status check in branch protection.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: Contributor License Agreement
    runs-on: ubuntu-latest
    steps:
      - name: Check CLA signature
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: https://github.com/ClearMetric-Labs/ClearMetric-Core/blob/main/CLA.md
          path-to-signatures: .cla-signatures/v1/cla.json
          branch: cla-signatures
          allowlist: bot*
