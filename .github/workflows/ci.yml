name: ci

on:
  push:
  pull_request:

jobs:
  package-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: catalog-core
            path: packages/catalog-core
          - name: query-map
            path: packages/query-map
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Install package dependencies
        run: |
          if [ "${{ matrix.package.name }}" = "query-map" ]; then
            python -m pip install -e packages/catalog-core
          fi
          python -m pip install -e "${{ matrix.package.path }}[dev,release]"

      - name: Run package test suite
        run: pytest -v ${{ matrix.package.path }}/tests

      - name: Build distribution artifacts
        run: |
          python -m build ${{ matrix.package.path }}
          if [ "${{ matrix.package.name }}" = "query-map" ]; then
            python -m build packages/catalog-core
          fi

      - name: Validate package metadata
        run: twine check ${{ matrix.package.path }}/dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv .pkgtest
          . .pkgtest/bin/activate
          python -m pip install --upgrade pip
          if [ "${{ matrix.package.name }}" = "catalog-core" ]; then
            python -m pip install ${{ matrix.package.path }}/dist/*.whl
            python -c "import catalog_core; print(catalog_core.__version__)"
          else
            python -m pip install packages/catalog-core/dist/*.whl
            python -m pip install ${{ matrix.package.path }}/dist/*.whl
            query-map --dialect postgres packages/query-map/examples/ugly_real_world.sql
            python -m query_map --dialect postgres packages/query-map/examples/simple.sql
          fi

  repository-boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/catalog-core
          python -m pip install -e "packages/query-map[dev]"

      - name: Run repository boundary checks
        run: pytest -v tests/test_repository_boundaries.py
