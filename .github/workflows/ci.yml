name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/clearmetric-core[dev]"
          python -m pip install ruff pyright

      - name: Run Ruff lint checks
        run: python -m ruff check --select E,F,I --ignore E501 --target-version py311 --extend-exclude .pkgmeta --extend-exclude .pkgsmoke --extend-exclude .pkgtest .

      - name: Run Ruff format check
        run: python -m ruff format --check --target-version py311 --exclude .pkgmeta --exclude .pkgsmoke --exclude .pkgtest .

      - name: Run Pyright
        run: pyright

      - name: Fail on legacy name references
        run: |
          if rg -i 'catalogkit' --glob '!.git' --glob '!CHANGELOG.md' --glob '!CONTRIBUTING.md' --glob '!.github/workflows/ci.yml' .; then
            echo "legacy name references remain"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/clearmetric-core[dev,release]"

      - name: Run package test suite
        run: python -m pytest -v packages/clearmetric-core/tests

      - name: Run repository boundary checks
        run: |
          python -m pytest -v \
            tests/test_repository_boundaries.py \
            tests/test_cross_package_artifacts.py \
            tests/test_module_independence.py

      - name: Lineage trust gate
        run: |
          python -m pytest -v \
            packages/clearmetric-core/tests/lineage/test_corpus_invariants.py \
            packages/clearmetric-core/tests/lineage/test_ground_truth.py \
            packages/clearmetric-core/tests/lineage/test_value_lineage_oracle.py \
            packages/clearmetric-core/tests/lineage/test_variant_warning_categories.py
          PYTHONPATH=packages/clearmetric-core \
            python packages/clearmetric-core/scripts/sweep_lineage_coverage.py

  release-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distribution artifacts
        run: python -m build packages/clearmetric-core

      - name: Validate package metadata
        run: python -m twine check packages/clearmetric-core/dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv .pkgsmoke
          . .pkgsmoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install packages/clearmetric-core/dist/*.whl
          cm --version
          FIXTURE=packages/clearmetric-core/tests/fixtures/lineage/projects/jaffle_shop/manifest.json
          cm compile "$FIXTURE" --dialect postgres > /dev/null
          cm impact orders.amount "$FIXTURE" --dialect postgres --upstream
          python -m clearmetric.cli --help
          python -c "import clearmetric.core, clearmetric.lineage, clearmetric.query, clearmetric.powerbi"
